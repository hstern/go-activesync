# Minimal Dovecot config for the SOGo testenv. Plaintext IMAP on
# 127.0.0.1:143; passwords in /etc/passwd via PAM; Maildirs under
# /home/<user>/Maildir.

protocols = imap lmtp

# Listen only on loopback — this is a single-container test target.
listen = 127.0.0.1

# Mail location matches the Maildir we pre-create in the Dockerfile.
mail_location = maildir:/home/%u/Maildir

# Plaintext auth on loopback only; sogo authenticates the user via
# IMAP LOGIN, so this is the trust anchor for the whole stack.
disable_plaintext_auth = no
auth_mechanisms = plain login

passdb {
    driver = passwd-file
    args   = scheme=PLAIN /etc/dovecot/users
}

userdb {
    driver = passwd-file
    args   = /etc/dovecot/users
}

# LMTP listener so postfix can deliver locally.
service lmtp {
    inet_listener lmtp {
        address = 127.0.0.1
        port = 24
    }
}

# Drop ssl for the testenv; everything is loopback.
ssl = no

log_path = /dev/stderr
info_log_path = /dev/stderr
debug_log_path = /dev/stderr
