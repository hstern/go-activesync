# Single-container SOGo + sogo-activesync test target. Build + run with:
#   make up      # docker compose up --build -d
#   make probe   # cmd/eas-autoprobe against it
#   make down    # docker compose down -v
#
# The container exposes EAS at http://localhost:8581/Microsoft-Server-ActiveSync
# Test credentials are integration / integration.

services:
  sogo:
    build:
      context: .
      dockerfile: Dockerfile.sogo
    container_name: go-activesync-sogo
    ports:
      - "8581:80"
    volumes:
      - sogo-pgdata:/var/lib/postgresql
      - sogo-state:/var/lib/sogo
      - sogo-logs:/var/log/sogo
      - sogo-mail:/home/integration/Maildir
    healthcheck:
      # OPTIONS to the EAS endpoint with the test credentials. SOGo's
      # sogo-activesync returns 200 with MS-AS protocol headers when the
      # backend is up and auth succeeds; an unauth probe gets 401 and
      # the container would never go healthy.
      test: ["CMD", "wget", "-q", "-O", "/dev/null",
             "--method=OPTIONS",
             "--user=integration", "--password=integration",
             "http://localhost/Microsoft-Server-ActiveSync"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s

volumes:
  sogo-pgdata:
  sogo-state:
  sogo-logs:
  sogo-mail:
