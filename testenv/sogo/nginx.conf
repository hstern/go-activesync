#
# nginx reverse proxy fronting SOGo (on 127.0.0.1:20000) and the
# sogo-activesync EAS endpoint at /Microsoft-Server-ActiveSync.

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/sogo-access.log;
    error_log  /var/log/nginx/sogo-error.log;

    # EAS endpoint. SOGo's sogo-activesync ships a Z-Push-derived
    # PHP app at /usr/lib/sogo-activesync; SOGo's daemon proxies it
    # internally through its WOWorker thread pool, so we just hand
    # the request to sogod.
    location /Microsoft-Server-ActiveSync {
        proxy_pass http://127.0.0.1:20000/SOGo/Microsoft-Server-ActiveSync;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 50m;
        # EAS Ping is a long-poll; raise read/send timeouts above the
        # default 60s so heartbeats don't get cut short.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SOGo Autodiscover. The default SOGo autodiscover responder only
    # speaks the Outlook request schema; sending mobilesync gets back
    # HTTP 400 <ErrorCode>601</ErrorCode> — exactly the interop case
    # v1.1.0's well-known fallback was reactive to. Keep this here so
    # the library's discovery flow runs through all five steps.
    location /Autodiscover/Autodiscover.xml {
        proxy_pass http://127.0.0.1:20000/SOGo/Autodiscover;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SOGo web UI + WebDAV (mostly useful for debugging by hand).
    location /SOGo {
        proxy_pass http://127.0.0.1:20000/SOGo;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    location / {
        return 302 /SOGo/;
    }
}
