// SOGo configuration for the go-activesync integration testenv.
// PropertyList syntax (NeXT/Apple plist), parsed by SOGo at startup.

{
    /* Profile + table-store URLs use SOGo's custom postgres:// scheme;
       the trailing /sogo_user_profile / sogo_folder_info names are
       the canonical SOGo table names. */
    SOGoProfileURL    = "postgresql://sogo:sogo@127.0.0.1:5432/sogo/sogo_user_profile";
    OCSFolderInfoURL  = "postgresql://sogo:sogo@127.0.0.1:5432/sogo/sogo_folder_info";
    OCSSessionsFolderURL = "postgresql://sogo:sogo@127.0.0.1:5432/sogo/sogo_sessions_folder";

    /* Authentication: SOGo asks Dovecot via IMAP login for credential
       verification. The same Dovecot is the mail backend below. */
    SOGoAuthenticationMethod = LDAP;
    SOGoLoginModule = Mail;

    /* SQL-backed user source so /Microsoft-Server-ActiveSync can
       resolve "integration" without an LDAP server. */
    SOGoUserSources = (
        {
            type = sql;
            id   = directory;
            viewURL = "postgresql://sogo:sogo@127.0.0.1:5432/sogo/sogo_users";
            canAuthenticate = YES;
            isAddressBook = NO;
            userPasswordAlgorithm = plain;
        }
    );

    /* Mail backends. SOGo issues IMAP AUTH and SMTP-relays through
       localhost. */
    SOGoMailingMechanism = smtp;
    SOGoSMTPServer       = "smtp://127.0.0.1:25";
    SOGoIMAPServer       = "imap://127.0.0.1:143/?TLS=NO";
    SOGoForceExternalLoginWithEmail = NO;

    /* Default identity for the test domain. */
    SOGoMailDomain = "asmcp.test";
    SOGoSentFolderName  = Sent;
    SOGoTrashFolderName = Trash;
    SOGoDraftsFolderName = Drafts;

    /* ActiveSync wiring. sogo-activesync (the Z-Push fork) reads
       these to know where SOGo lives + how aggressive to be on
       sync windows. */
    SOGoEnableEMailAlarms = YES;
    SOGoSearchMinimumWordLength = 2;
    SxVMemLimit = 384;
    WOPort = 20000;
    WOWorkersCount = 2;
    WOLogFile = "/var/log/sogo/sogo.log";
    WOPidFile = "/var/run/sogo/sogo.pid";

    /* memcached for session cache. */
    SOGoMemcachedHost = "127.0.0.1";

    /* No TLS for testenv. */
    SOGoTrustProxyAuthentication = NO;
}
