# Minimal Dovecot config for the integration test stack.
# - PAM-backed system users (we use the `integration` Linux account).
# - Maildir at $HOME/Maildir.
# - IMAP on 143 (no SSL — only reachable inside the container).
# - LMTP on a unix socket so postfix can deliver locally.

protocols = imap lmtp

mail_location = maildir:~/Maildir
namespace inbox {
  inbox = yes
}

# Plaintext auth is fine inside an isolated test container; PAM picks
# up the system password set in the Dockerfile.
disable_plaintext_auth = no
auth_mechanisms = plain login
# Strip the @domain part of the username on every lookup (auth + LMTP
# recipient resolution). Postfix forwards mail addressed as
# integration@localhost.asmcp.test; dovecot's userdb only knows the
# bare 'integration' system user.
auth_username_format = %n
passdb {
  driver = pam
}
userdb {
  driver = passwd
}

service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 0
  }
}

service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
}

# Prefer SUBSCRIBE-on-create so common folders show up via FolderSync
# without manual intervention.
namespace inbox {
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
}

log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot.info.log
