# Apache vhost serving Z-Push at /Microsoft-Server-ActiveSync.
# This matches the path real EAS clients expect.

<VirtualHost *:80>
    ServerName asmcp.test
    DocumentRoot /var/www/html

    Alias /Microsoft-Server-ActiveSync /usr/share/z-push/index.php
    <Directory /usr/share/z-push>
        Require all granted
        Options +ExecCGI
        AddHandler application/x-httpd-php .php
        DirectoryIndex index.php
    </Directory>

    # PHP needs generous limits for body uploads (MIME bodies, attachments).
    php_admin_value upload_max_filesize 50M
    php_admin_value post_max_size 50M
    php_admin_value memory_limit 256M
    php_admin_value max_execution_time 300

    # Z-Push expects to read the Authorization header itself.
    SetEnvIfNoCase Authorization "(.*)" HTTP_AUTHORIZATION=$1

    ErrorLog ${APACHE_LOG_DIR}/zpush_error.log
    CustomLog ${APACHE_LOG_DIR}/zpush_access.log combined
</VirtualHost>
