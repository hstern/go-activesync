# Radicale CalDAV/CardDAV server, used by Z-Push's BackendCalDAV and
# BackendCardDAV so the integration tests can exercise calendar and
# contacts commands. Listens only on the container's loopback —
# Apache + Z-Push reach it at 127.0.0.1:5232.

[server]
hosts = 127.0.0.1:5232
max_connections = 20

[auth]
type = htpasswd
htpasswd_filename = /etc/radicale/users
htpasswd_encryption = bcrypt

[storage]
filesystem_folder = /var/lib/radicale/collections

[logging]
level = info
