name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly catch-all so CodeQL re-scans even if no commits have landed.
    - cron: "27 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - uses: github/codeql-action/init@v4
        with:
          languages: go
          # security-extended turns on the broader query suite; default
          # is "security-and-quality" which is even larger but flags
          # more style issues. extended is the sweet spot for a library.
          queries: security-extended

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
